<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#022c22" />
      <stop offset="100%" stop-color="#030712" />
    </radialGradient>
    <linearGradient id="emeraldTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#14b8a6" />
    </linearGradient>
    <linearGradient id="cyanBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bgGrad)" />
  <rect width="488" height="488" x="12" y="12" rx="98" fill="none" stroke="url(#emeraldTeal)" stroke-width="4" stroke-opacity="0.25" />
  
  <!-- Network Edges/Connections -->
  <line x1="150" y1="150" x2="362" y2="150" stroke="#1e293b" stroke-width="8" stroke-dasharray="4,4" />
  <line x1="150" y1="150" x2="256" y2="310" stroke="url(#emeraldTeal)" stroke-width="9" filter="url(#glow)" />
  <line x1="362" y1="150" x2="256" y2="310" stroke="url(#cyanBlue)" stroke-width="9" filter="url(#glow)" />
  <line x1="256" y1="310" x2="256" y2="420" stroke="#1e293b" stroke-width="8" />
  <line x1="150" y1="150" x2="150" y2="360" stroke="#1e293b" stroke-width="6" />
  <line x1="362" y1="150" x2="362" y2="360" stroke="#1e293b" stroke-width="6" />

  <!-- Graph Nodes -->
  <!-- Start node (Emerald) -->
  <circle cx="150" cy="150" r="42" fill="url(#emeraldTeal)" filter="url(#glow)" />
  <circle cx="150" cy="150" r="20" fill="#ffffff" fill-opacity="0.5"/>

  <!-- Left node (Inactive) -->
  <circle cx="362" cy="150" r="38" fill="#1e293b" stroke="#334155" stroke-width="4" />
  
  <!-- Focused / Target Pathfinder node (Cyan glow) -->
  <circle cx="256" cy="310" r="48" fill="url(#cyanBlue)" filter="url(#glow)" />
  <polygon points="256,284 278,326 234,326" fill="#ffffff" />

  <!-- Bottom extension nodes (Small) -->
  <circle cx="256" cy="420" r="25" fill="#1e293b" stroke="#334155" stroke-width="3" />
  <circle cx="150" cy="360" r="25" fill="#1e293b" stroke="#334155" stroke-width="3" />
  <circle cx="362" cy="360" r="25" fill="#1e293b" stroke="#334155" stroke-width="3" />
</svg>
